<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A modern SaaS-style task manager to organize your daily work." />
  <!-- favicon -->
  <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <!-- normalize css -->
  <link rel="stylesheet" href="./normalize.css" />
  <!-- main css -->
  <link rel="stylesheet" href="./main.css" />
  <title>Task Manager</title>
</head>

<body>

  <!-- ============ HEADER ============ -->
  <header class="app-header">
    <div class="header-brand">
      <div class="header-icon">
        <i class="fas fa-layer-group"></i>
      </div>
      <span class="header-title">TaskFlow</span>
    </div>
    <span class="header-badge">Dashboard</span>
  </header>

  <!-- ============ MAIN CONTENT ============ -->
  <main class="page-wrapper">

    <!-- Add Task Form -->
    <form class="task-form" id="task-form">
      <h4>task manager</h4>
      <p class="form-label-row">
        <i class="fas fa-plus-circle"></i>
        Add a new task
      </p>
      <div class="form-control">
        <input type="text" id="task-input" name="name" class="task-input" placeholder="e.g. Review pull request #42"
          autocomplete="off" />
        <button type="submit" class="btn submit-btn">
          <i class="fas fa-plus"></i>
          Add
        </button>
      </div>
      <div class="form-alert"></div>
    </form>

    <!-- Tasks List -->
    <section class="tasks-container">
      <div class="tasks-header">
        <span class="tasks-title">Your Tasks</span>
        <p class="loading-text"><i class="fas fa-circle-notch fa-spin"></i> Loading…</p>
      </div>
      <div class="tasks" id="tasks-list"></div>
    </section>
  </main>

  <!-- Floating Action Button (scrolls to form) -->
  <button class="fab" id="fab-btn" title="Add new task" aria-label="Add new task">
    <i class="fas fa-plus"></i>
  </button>

  <!-- axios -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.21.1/axios.min.js"
    integrity="sha512-bZS47S7sPOxkjU/4Bt0zrhEtWx0y0CRkhEp8IckzK+ltifIIE9EMIMTuT/mEzoIMewUINruDBIR/jJnbguonqQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="./browser-app.js"></script>
  <script>
    // FAB scrolls to form and focuses input
    document.getElementById('fab-btn').addEventListener('click', () => {
      document.getElementById('task-form').scrollIntoView({ behavior: 'smooth' });
      setTimeout(() => document.getElementById('task-input').focus(), 400);
    });
  </script>
</body>

</html>
